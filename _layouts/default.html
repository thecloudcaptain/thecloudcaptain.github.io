<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    {% if page.title %}
      {{ page.title }} | The Cloud Captain
    {% else %}
      The Cloud Captain
    {% endif %}
  </title>

  <meta
    name="description"
    content="{{ page.description | default: site.description }}"
  >

  <link
    rel="icon"
    type="image/png"
    href="{{ '/assets/images/tcc-logo.png' | relative_url }}"
  >

  <link
    rel="stylesheet"
    href="{{ '/assets/css/style.css' | relative_url }}"
  >
</head>

<body>

  <header class="site-header">
    <div class="header-container">

      <a
        class="brand"
        href="{{ '/' | relative_url }}"
        aria-label="The Cloud Captain home"
      >
        <img
          class="brand-logo"
          src="{{ '/assets/images/tcc-logo.png' | relative_url }}"
          alt="The Cloud Captain logo"
        >

        <div class="brand-text">
          <span class="brand-name">The Cloud Captain</span>
          <span class="brand-tagline">
            Cloud strategy. Architecture. Engineering.
          </span>
        </div>
      </a>

      <nav class="site-nav" aria-label="Main navigation">
        <a
          href="{{ '/' | relative_url }}"
          {% if page.url == '/' %}class="active"{% endif %}
        >
          Home
        </a>

        <a
          href="{{ '/articles/' | relative_url }}"
          {% if page.url contains '/articles/' %}class="active"{% endif %}
        >
          Articles
        </a>

        <a
          href="{{ '/about/' | relative_url }}"
          {% if page.url contains '/about/' %}class="active"{% endif %}
        >
          About
        </a>
      </nav>

    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-container">

      <div class="footer-brand">
        <img
          src="{{ '/assets/images/tcc-logo.png' | relative_url }}"
          alt=""
          class="footer-logo"
        >

        <div>
          <strong>The Cloud Captain</strong>
          <p>
            Practical cloud architecture and engineering guidance.
          </p>
        </div>
      </div>

      <div class="footer-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/articles/' | relative_url }}">Articles</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </div>

      <p class="footer-copyright">
        &copy; {{ site.time | date: "%Y" }} The Cloud Captain.
      </p>

    </div>
  </footer>

</body>
</html>
